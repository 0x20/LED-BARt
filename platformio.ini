; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino

; Serial Monitor options
monitor_speed = 115200

; Upload options
upload_speed = 921600

; Build source file
build_src_filter = +<main.cpp>

; Library dependencies
lib_deps =
    paulstoffregen/Time@^1.6.1

[env:d1_mini_mqtt]
platform = espressif8266
board = d1_mini
framework = arduino

; Serial Monitor options
monitor_speed = 115200

; Upload options
upload_speed = 115200

; Build source file - use MQTT version
build_src_filter = +<main_mqtt.cpp>

; Library dependencies
lib_deps =
    paulstoffregen/Time@^1.6.1
    knolleary/PubSubClient@^2.8

[env:d1_mini_web]
platform = espressif8266
board = d1_mini
framework = arduino

; Serial Monitor options
monitor_speed = 115200

; Upload options
upload_speed = 115200

; Build source file - use web server version (best for debugging)
build_src_filter = +<main_webserver.cpp>

; Library dependencies
lib_deps =
    paulstoffregen/Time@^1.6.1
    knolleary/PubSubClient@^2.8

[env:xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino

; Serial Monitor options
monitor_speed = 115200

; Upload options
upload_speed = 460800

; Build source file - web server version for XIAO ESP32-C3
build_src_filter = +<main_xiao_esp32c3.cpp>

; Library dependencies
lib_deps =
    paulstoffregen/Time@^1.6.1
    knolleary/PubSubClient@^2.8

[env:xiao_esp32c3_direct]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino

; Serial Monitor options
monitor_speed = 115200

; Upload options
upload_speed = 460800

; Build source file - Direct LED driver (no Arduino needed)
build_src_filter = +<main_esp32c3_direct.cpp>

; Library dependencies
lib_deps =
    paulstoffregen/Time@^1.6.1
    knolleary/PubSubClient@^2.8

[env:uno]
platform = atmelavr
board = uno
framework = arduino

; Serial Monitor options
monitor_speed = 115200

; Build settings for Arduino Uno sketch
src_dir = scripts/led_bart_arduino_uno_receiver
